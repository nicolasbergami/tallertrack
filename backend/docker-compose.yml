version: '3.9'

services:
  backend:
    build: .
    container_name: tallertrack-backend
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env
    # Las sesiones de WhatsApp se persisten en PostgreSQL (db-auth-state.ts),
    # por lo que no se necesitan volúmenes locales para Baileys.
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
